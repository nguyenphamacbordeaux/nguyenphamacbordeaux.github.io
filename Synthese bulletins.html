<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Appréciation générale</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background-color: #f0f2f5; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1100px; margin: auto; }
        .section { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background: #fff; }
        h2 { color: #2c3e50; font-size: 1.2em; border-bottom: 2px solid #3498db; padding-bottom: 8px; }
        .batch-container { margin-top: 25px; padding: 20px; background: #f8f9fa; border-radius: 10px; border-left: 6px solid #27ae60; }
        textarea { width: 100%; height: 150px; margin-top: 10px; font-size: 13px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        .prompt-output { height: 400px; font-family: 'Consolas', monospace; background: #2d3436; color: #dfe6e9; }
        .btn { padding: 12px 24px; cursor: pointer; border: none; border-radius: 6px; font-weight: bold; }
        .btn-generate { background: #27ae60; color: white; width: 100%; font-size: 1.1em; margin-top: 15px; }
        .student-input-row { display: flex; align-items: center; gap: 15px; margin-bottom: 8px; padding: 10px; background: #f1f2f6; border-radius: 5px; }
        .student-input-row label { min-width: 220px; font-weight: bold; color: #2980b9; }
        .student-input-row input { flex-grow: 1; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #2d3436; color: white; padding: 12px 24px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Assistant Conseil de Classe</h1>

    <div class="section">
        <h2>1. Importation et Contexte Classe</h2>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div>
                <label><b>Bulletin Global (PDF) :</b></label><br>
                <input type="file" id="classFile" accept=".pdf">
                <div style="margin-top:10px;">
                    <label><i>Note prof sur la classe :</i></label>
                    <input type="text" id="classComment" style="width:100%;" placeholder="Ex: Groupe moteur mais hétérogène...">
                </div>
            </div>
            <div>
                <label><b>Bulletins Élèves (Multi-PDF) :</b></label><br>
                <input type="file" id="studentFiles" multiple accept=".pdf">
            </div>
        </div>
    </div>

    <div id="studentPersonalComments" class="section" style="display:none;">
        <h2>2. Observations individuelles (Nom Complet)</h2>
        <p style="font-size: 0.9em; color: #666; margin-bottom: 10px;">Saisissez vos remarques ci-dessous. Le nom de famille sera masqué automatiquement dans le prompt pour favoriser les accords de genre corrects.</p>
        <div id="studentListInputs"></div>
    </div>

    <button class="btn btn-generate" id="processBtn" style="display:none;" onclick="generateAllPrompts()">GÉNÉRER LES PROMPTS</button>

    <div id="outputArea" style="display:none;">
        <div id="classPrompt" class="batch-container"></div>
        <div id="studentPrompts"></div>
    </div>
</div>

<div id="toast" class="toast">Prompt copié !</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

    let classData = "";
    let studentList = [];
    const subjects = ["FRANCAIS", "MATHEMATIQUES", "HISTOIRE-GEOGRAPHIE", "PHYSIQUE-CHIMIE", "SNT", "SVT", "ANGLAIS", "ESPAGNOL", "TECHNOLOGIE", "EPS", "ARTS PLASTIQUES", "MUSICALE", "LATIN", "EMC"];

    async function extractPdf(file) {
        const buffer = await file.arrayBuffer();
        const pdf = await pdfjsLib.getDocument({data: buffer}).promise;
        let text = "";
        for(let i=1; i<=pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const content = await page.getTextContent();
            text += content.items.map(item => item.str).join(" ");
        }
        return text;
    }

    document.getElementById('classFile').onchange = async (e) => {
        const text = await extractPdf(e.target.files[0]);
        let parts = text.split(/Appréciations générales/i);
        classData = parts.length > 1 ? parts[1].substring(0, 1500) : text.substring(0, 1500);
        checkReady();
    };

    document.getElementById('studentFiles').onchange = async (e) => {
        studentList = [];
        const files = Array.from(e.target.files);
        const listDiv = document.getElementById('studentListInputs');
        listDiv.innerHTML = "";
        
        for (let i = 0; i < files.length; i++) {
            const f = files[i];
            const text = await extractPdf(f);
            
            let fullName = f.name.replace('.pdf','').replace(/_/g, ' ');

            const row = document.createElement('div');
            row.className = "student-input-row";
            row.innerHTML = `<label>${fullName}</label>
                             <input type="text" id="comm-${i}" placeholder="Observation pour cet élève...">`;
            listDiv.appendChild(row);

            let appraisals = {};
            let positions = subjects.map(s => ({ name: s, pos: text.toUpperCase().indexOf(s) }))
                                    .filter(s => s.pos !== -1)
                                    .sort((a,b) => a.pos - b.pos);

            for (let k = 0; k < positions.length; k++) {
                let start = positions[k].pos + positions[k].name.length;
                let end = positions[k+1] ? positions[k+1].pos : start + 1000;
                let content = text.substring(start, end).replace(/\s+/g, ' ').trim();
                appraisals[positions[k].name] = content;
            }
            studentList.push({ fullName: fullName, appraisals: appraisals, index: i });
        }
        document.getElementById('studentPersonalComments').style.display = 'block';
        checkReady();
    };

    function checkReady() {
        if(classData && studentList.length > 0) document.getElementById('processBtn').style.display = 'block';
    }

    function generateAllPrompts() {
        document.getElementById('outputArea').style.display = 'block';
        const globalComment = document.getElementById('classComment').value;
        
        const classDiv = document.getElementById('classPrompt');
        let cp = "CONTEXTE CLASSE :\n" + classData.trim() + "\n";
        if(globalComment) cp += "OBSERVATION GÉNÉRALE : " + globalComment + "\n";
        cp += "\nCONSIGNE : Rédige une synthèse globale pour le bulletin de la classe.";
        renderBox(classDiv, "1. SYNTHÈSE DE LA CLASSE", cp, "class-box");

        const studentArea = document.getElementById('studentPrompts');
        studentArea.innerHTML = "";
        
        for (let i = 0; i < studentList.length; i += 10) {
            const batch = studentList.slice(i, i + 10);
            let sp = "--- INSTRUCTIONS RÉDACTIONNELLES ---\n";
            sp += "CONSIGNE : Rédige une synthèse de 3-4 lignes pour CHAQUE élève.\n";
            sp += "RÈGLE D'OR : Utilise UNIQUEMENT le prénom de l'élève. Accorde les adjectifs en fonction du genre suggéré par le prénom.\n\n";
            
            batch.forEach(s => {
                const commentInput = document.getElementById(`comm-${s.index}`);
                const observation = commentInput ? commentInput.value.trim() : "";
                
                let firstName = s.fullName.split(' ')[0];
                
                sp += `ÉLÈVE : ${firstName}\n`;
                if(observation) {
                    sp += `> OBSERVATION À INTÉGRER POUR ${firstName} : ${observation}\n`;
                }
                
                for(let m in s.appraisals) sp += `[${m}] : ${s.appraisals[m]}\n`;
                sp += `--- FIN ÉLÈVE ${firstName} ---\n\n`;
            });
            
            const box = document.createElement('div');
            box.className = "batch-container";
            renderBox(box, `2. ÉLÈVES ${i+1} À ${Math.min(i+10, studentList.length)}`, sp, `txt-s-${i}`);
            studentArea.appendChild(box);
        }
    }

    function renderBox(container, title, content, id) {
        container.innerHTML = `
            <h3>${title}</h3>
            <textarea id="${id}" class="prompt-output">${content}</textarea>
            <button class="btn" style="background:#6c5ce7; color:white; margin-top:10px;" onclick="copyAndOpen('${id}')">📋 Copier & Ouvrir Gemini</button>
        `;
    }

    window.copyAndOpen = (id) => {
        const t = document.getElementById(id);
        t.select();
        document.execCommand('copy');
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
        window.open('https://gemini.google.com/app', '_blank');
    };
</script>
</body>
</html>
