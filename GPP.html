<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>GPP - NP</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 1100px; margin: 20px auto; background-color: var(--bg); color: var(--primary); }
        .container { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 30px rgba(0,0,0,0.08); position: relative; }
        h2 { border-bottom: 3px solid var(--primary); padding-bottom: 10px; margin-top: 0; display: flex; align-items: center; justify-content: space-between; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .field { margin-bottom: 10px; }
        .full-width { grid-column: span 4; }
        label { display: block; font-weight: bold; margin-bottom: 6px; font-size: 0.9em; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d8e0; border-radius: 8px; box-sizing: border-box; }
        
        .button-group { display: flex; gap: 15px; margin: 25px 0; flex-wrap: wrap; }
        .btn-prompt { flex: 1; min-width: 180px; padding: 16px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.3s; color: white; }
        .btn-prompt:hover { filter: brightness(1.1); transform: translateY(-2px); }
        
        #advice-display { margin: 10px 0; padding: 15px; background: #fff9db; border-left: 5px solid #f1c40f; border-radius: 8px; display: none; font-style: italic; color: #856404; }

        .info-icon { cursor: pointer; font-size: 24px; color: var(--accent); transition: 0.2s; }
        .info-icon:hover { transform: scale(1.1); }
        
        #result-container { position: relative; margin-top: 20px; }
        #result { width: 100%; height: 450px; font-family: 'Fira Code', monospace; font-size: 13px; padding: 20px; border-radius: 10px; background: #2d3436; color: #dfe6e9; line-height: 1.6; resize: vertical; }
        .copy-badge { position: absolute; top: 75px; right: 25px; background: #00b894; color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; display: none; z-index: 10; }
        
        .btn-copy-gemini { background: #1a73e8; margin-bottom: 10px; padding: 14px; font-size: 14px; color: white; border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-copy-gemini:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="container">
    <h2>
        <span>📝 Générateur de Prompts Personnalisés</span>
        <span class="info-icon" onclick="showInfo()" title="Informations">ⓘ</span>
    </h2>
    
    <div class="grid">
        <div class="field"><label>Titre :</label><input type="text" id="titre" placeholder="Ex: TD"></div>
        <div class="field">
            <label>Classe :</label>
            <select id="classe">
                <option value="Seconde">Seconde</option>
                <option value="Première Spécialité">Première Spécialité</option>
                <option value="Première ST2S">Première ST2S</option>
                <option value="Terminale ST2S">Terminale ST2S</option>
                <option value="Terminale Générale">Terminale Générale</option>
                <option value="Terminale Spécialité">Terminale Spécialité</option>
                <option value="Terminale Complémentaire">Terminale Complémentaire</option>
                <option value="Terminale Expert">Terminale Expert</option>
            </select>
        </div>
		<div class="field"><label>Durée en min:</label><input type="text" id="duree" placeholder="Ex: 55 min"></div>
        <div class="field"><label>Thème :</label><input type="text" id="theme" placeholder="Ex: Logarithme"></div>
		<div class="field" style="display: flex; align-items: center; gap: 10px; grid-column: span 2;">
			<input type="checkbox" id="no_python" style="width: auto;">
			<label for="no_python" style="margin-bottom: 0;">🚫 Exclure Python</label>
		</div>
        <div class="field full-width">
            <label>Contraintes spécifiques :</label>
            <textarea id="contrainte" rows="2" placeholder="Ajoutez vos exigences ici..."></textarea>
        </div>
    </div>

    <div id="main-button-group" class="button-group"></div>

    <div id="result-container">
        <div id="advice-display"></div>
        <span id="copy-status" class="copy-badge">Copié !</span>
		<button onclick="copyAndOpenGemini()" class="btn-copy-gemini">
		🚀 Copier le prompt et ouvrir Gemini
		</button>
        <textarea id="result" placeholder="Le prompt généré apparaîtra ici..."></textarea>
    </div>
</div>

<script>
    const config = {
        prompts: [
            { 
                id: 'ACT', label: '📝 Générer l\'Activité', color: '#27ae60', advice: "🆔Tu peux proposer des activités imposées.",
                content: "En tant qu'enseignant, rédige une activité structurée en LaTeX titrée {{titre}} sur le thème {{theme}} pour une classe de {{classe}}\n{{contrainte}}\n{{no_python}}\n### STRUCTURE DU CONTENU :\n- Une introduction contextualisée pour introduire la notion.\n- Une série de questions progressives (conjectures, manipulations, démonstrations guidées).\n- Une partie \"Bilan\" à compléter pour faire émerger la trace écrite.\n- Une partie \"Exercices\" comportant 2 exercices qui appliquent les notions abordées\n\n- Je ne veux aucune référence ou citation\n- N'utilise pas de balise subsection\n- Je souhaite le code complet\n\n### STRUCTURE DE MISE EN PAGE à respecter scrupuleusement:\n\\documentclass[12pt,a4paper]{article}\n\\usepackage[utf8]{inputenc}\n\\usepackage[T1]{fontenc}\n\\usepackage[french]{babel}\n\\usepackage{amsmath, amssymb, eurosym, amsfonts, amsthm, geometry, enumerate, enumitem, tikz, tkz-tab,multicol}\n\\geometry{margin=1.5cm}\n \\newcommand{\\PhamN}{\\mbox{\\scalebox{1.5}[1]{P}\\kern-0.6em\\raisebox{0ex}[0pt][0pt]{\\fontsize{6}{6}\\selectfont ham}\n\\kern-0.5em\\scalebox{1.5}[1]{N}}}\n\\usepackage{tabularx}\n\\newcommand{\\classe}{{{classe}}}\n\\newcommand{\\titre}{{{titre}}}\n\\newcommand{\\theme}{{{theme}}}\n\\newcommand{\\matiere}{Math}\n\\newcommand{\\duree}{{{duree}}}\n\\newcommand{\\entetperso}[1]{\n\\noindent\n\\begin{tabularx}{\\textwidth}{|l >{\\centering\\arraybackslash}X r|}\n\\hline\n\\textbf{\\classe} & \\textbf{Lyc\\'ee V\\'aclav Havel} & \\PhamN\\\\\n\\hline\nNom : & \\textbf{\\titre} &  \\textbf{\\theme} \\\\\nPr\\'enom : & #1 & \\textbf{\\matiere} \\\\\n\\hline\n\\end{tabularx}\n\\vspace{0.3cm}}\n\\begin{document}\n\\enteteperso{}\n\\section{Objectif(s)}\n... \n\n\\section{Étude de situation}\n\\begin{enumerate}\n\\item \n\\end{enumerate}\n\n\\section{Bilan de l'activité}\n\\textit{À retenir : ...}\n\n\\end{document}" 
            },
            { 
                id: 'CRS', label: '📚 Générer le Cours', color: '#9b59b6', advice: "✖️ Pas de document à fournir. 🆔 Tu peux expliciter les notions à aborder.",
                content: "En tant qu'enseignant, rédige un cours de mathématiques structuré en LaTeX titrée {{titre}} sur le thème \"{{theme}}\" pour une classe de {{classe}}\n{{contrainte}}\n{{no_python}}\n### STRUCTURE DU CONTENU :\n- Une introduction contextualisée pour introduire la notion.\n- Toutes les formules, démonstrations , remarques éventuelles\n- Je ne veux aucune référence ou citation\n- N'utilise pas de balise subsection\n- Je souhaite le code complet\n\n### STRUCTURE DE MISE EN PAGE à respecter scrupuleusement:\n\\documentclass[preview,varwidth,margin=1.5cm]{standalone}\n\\usepackage[utf8]{inputenc}\n\\usepackage[T1]{fontenc}\n\\usepackage[french]{babel}\n\\usepackage{amsmath, amssymb, eurosym, amsfonts, amsthm, geometry, enumerate, enumitem, tabularx, eurosym, tikz,tkz-tab,multicol}\n\\newcommand{\\PhamN}{\\mbox{\\scalebox{1.5}[1]{P}\\kern-0.6em\\raisebox{0ex}[0pt][0pt]{\\fontsize{6}{6}\\selectfont ham}\n\\kern-0.5em\\scalebox{1.5}[1]{N}}}\n\\newtheoremstyle{break}{10pt}{10pt}{\\itshape}{}{\\bfseries}{.}{\\newline}{}\n\\theoremstyle{break}\n\\newtheorem{definition}{Définition}\n\\newtheorem{theoreme}{Théorème}\n\\newtheorem{propriete}{Propriété}\n\\newtheorem{demonstration}{Démonstration}\n\\newtheorem{exemple}{Exemple}\n\\newtheorem{methode}{Méthode}\n\\newtheorem{remarque}{Remarque}\n\n\\title{\\textbf{{{titre}: {{theme}}}}}\n\\author{\\PhamN}\n\\date{}\n\n\\begin{document}\n\\maketitle\n\n\\section{...}\n\n\\end{document}" 
            },
            { 
                id: 'TD', label: '⚙️ Générer le Travail Dirigé', color: '#3498db', advice: "📁 Tu peux fournir le cours 🆔 Tu peux aussi citer tous les points essentiels à retenir.",
                content: "En tant qu'enseignant, rédige un travail dirigé en LaTeX titrée {{titre}} pour des élèves de {{classe}}\n{{contrainte}}\n{{no_python}}\n### INSTRUCTION DE CONTEXTE : Si un contenu de cours a été fourni précédemment, base-toi prioritairement sur ses notations, démonstrations et méthodes.\n\n### STRUCTURE DU CONTENU :\nUne partie \"L'essentiel à retenir\" résumant le chapitre {{theme}} (formules et graphiques TikZ).\nUne partie \"Exercices d'application\" contenant 10 exercices d'application directe.\nUne partie \"Exercices d'approfondissement\" contenant 10 exercices d'approfondissement.\n\n- Je ne veux aucune référence ou citation\n- N'utilise pas de balise subsection\n- Pour python utilise l'environnement verbatim\n- Je souhaite le code complet \n### STRUCTURE DE MISE EN PAGE à respecter scrupuleusement:\n\\documentclass[12pt,a4paper]{article}\n\\usepackage[utf8]{inputenc}\n\\usepackage[T1]{fontenc}\n\\usepackage[french]{babel}\n\\usepackage{amsmath, amssymb, eurosym, amsfonts, amsthm, geometry, enumerate, enumitem, tabularx, eurosym, tikz,tkz-tab,multicol}\n\\geometry{margin=1.5cm}\n\n\\usepackage{tabularx}\n\\newcommand{\\classe}{{{classe}}}\n\\newcommand{\\titre}{{{titre}}}\n\\newcommand{\\PhamN}{\\mbox{\\scalebox{1.5}[1]{P}\\kern-0.6em\\raisebox{0ex}[0pt][0pt]{\\fontsize{6}{6}\\selectfont ham}\n\\kern-0.5em\\scalebox{1.5}[1]{N}}}\n\\newcommand{\\theme}{{{theme}}}\n\\newcommand{\\matiere}{Math}\n\\newcommand{\\duree}{{{duree}}}\n\\newcommand{\\entetperso}[1]{\n\\noindent\n\\begin{tabularx}{\\textwidth}{|l >{\\centering\\arraybackslash}X r|}\n\\hline\n\\textbf{\\classe} & \\textbf{Lyc\\'ee V\\'aclav Havel} & \\PhamN\\\\\n\\hline\nNom : & \\textbf{\\titre} &  \\textbf{\\theme} \\\\\nPr\\'enom : & #1 & \\textbf{\\matiere} \\\\\n\\hline\n\\end{tabularx}\n\\vspace{0.3cm}}\n\\begin{document}\n\\enteteperso{}\n\\section{L'essentiel du cours}\n\\begin{enumerate}\n... à remplir ...\n\\end{enumerate}\n\\section{Exercices d'application}\n\\begin{enumerate}\n... à remplir ...\n\\end{enumerate}\n\\section{Exercices d'approfondissement}\n\\begin{enumerate}\n... à remplir ...\n\\end{enumerate}\nUtilise \\vspace pour laisser suffisament de place pour répondre à chaque exercice et occuper l'intégralité des lignes des 4 pages sans utiliser \\newpage afin de l'imprimer au format livret" 
            },
            { 
                id: 'DS', label: '📄 Générer le Devoir Surveillé', color: '#e67e22', advice: "📁 Ne pas oublier de charger le cours et / ou le TD pour inspirer le DS.",
                content: "En tant qu'enseignant, rédige un devoir surveillé en LaTeX, titrée {{titre}} noté sur 20 points en LaTeX  pour une classe de {{classe}} sur le theme {{theme}} d'une durée de {{duree}}\n{{contrainte}}\n{{no_python}}\n### INSTRUCTION DE CONTEXTE : Si du contenu de TD a été fourni précédemment, inspire toi de ses exercices.\nSi plusieurs thèmes sont abordés, équilibre les thèmes dans les exercices proposés\n### STRUCTURE DU CONTENU :\n- Exercice 1 : QCU de 4 questions, avec 4 propositions a, b, c et d classées par ordre croissant et non alphabétique, écrites sur la ligne suivante et séparées par \\quad puis sur la même ligne \\hfill Qnuméro:\\dots \\vspace{0.5cm}\nÉnoncé de l'exercice 1: \\noindent \\textit{\\textbf{Consigne: }Pour chaque question, une seule réponse est exacte. Écrire la lettre correspondante $\\Downarrow$.}\n-2 exercices de type application directe en les nommant judicieusement, avec 2 questions et notés sur 2 points.\n-Pour les devoirs de moins de 60 minutes : deux exercices de type évaluation, en les nommant judicieusement, avec 6 questions s'enchaînant dans une logique de recherche.\n-Pour les devoirs de 90 minutes : trois exercices de type évaluation, en les nommant judicieusement, avec 6 questions s'enchaînant dans une logique de recherche.\n-Pour les devoirs de plus de 100 minutes : trois exercices de type évaluation, en les nommant judicieusement, avec 8 questions s'enchaînant dans une logique de recherche.\n-à la fin de chaque sujet, complète avec des lignes vierges en utilisant \\lignesreponse pour compléter les 150 lignes disponibles sur 4 pages.\n-Génère deux versions (A et B) avec des exercices distincts mais une difficulté équilibrée.\n-Je souhaite également une version PAP c'est à dire exactement la version A tronquée d'une question dans chaque exercice pour être évaluée sur 15 points, sans modifier les questions restantes et la présentation\n- Je souhaite également les corrections détaillés en forçant le retour à la ligne à chaque question\n-Dans la correction de la version A, il faut discrètement marquer d'un astérisque les numéros des questions retirées pour la version PAP.\n-Je ne veux aucune référence ou citation\n-N'utilise pas de balise subsection\n-Pour python utilise l'environnement verbatim\n-Je souhaite le code complet\n### STRUCTURE DE MISE EN PAGE à respecter scrupuleusement:\n\\documentclass[12pt,a4paper]{article}\n\\usepackage[utf8]{inputenc}\n\\usepackage[T1]{fontenc}\n\\usepackage[french]{babel}\n\\usepackage{amsmath, amssymb, eurosym, amsfonts, amsthm, geometry, enumerate, enumitem, eurosym, tikz,tkz-tab,multicol}\n\\geometry{margin=1.5cm}\n\n\\usepackage{tabularx}\n\\newcommand{\\classe}{Seconde}\n\\newcommand{\\titre}{{{titre}}}\n\\newcommand{\\PhamN}{\\mbox{\\scalebox{1.5}[1]{P}\\kern-0.6em\\raisebox{0ex}[0pt][0pt]{\\fontsize{6}{6}\\selectfont ham}\n\\kern-0.5em\\scalebox{1.5}[1]{N}}}\n\\newcommand{\\theme}{{{theme}}}\n\\newcommand{\\matiere}{Math}\n\\newcommand{\\duree}{{{duree}}}\n\\newcommand{\\entetperso}[1]{\n\\noindent\n\\begin{tabularx}{\\textwidth}{|l >{\\centering\\arraybackslash}X r|}\n\\hline\n\\textbf{\\classe} & \\textbf{Lyc\\'ee V\\'aclav Havel} & \\PhamN\\\\\n\\hline\nNom : & \\textbf{\\titre} &  \\textbf{\\theme} \\\\\nPr\\'enom : & #1 & \\textbf{\\matiere} {\\duree} \\\\\n\\hline\n\\end{tabularx}}\n\\vspace{-1pt}\\noindent\n\\begin{tabularx}{\\textwidth}{|p{3cm}|X|}\\hline\\textbf{Note :} & \\textbf{Commentaires :} \\\\\n\\hfil \\Huge \\qquad/20 & \\\\\n\\hline\n\\end{tabularx}\n\\begin{center}\n\\textit{\\small La qualit\\'e de la r\\'edaction, la clart\\'e et la pr\\'ecision des raisonnements seront prises en compte.}\n\\end{center}\n\\hrule\n\\vspace{0.5cm}}\n\\newcommand{\\lignesreponse}[1]{\\foreach \\i in {1,...,#1} {\n\\noindent\\hspace*{2cm}\\rule{\\dimexpr\\linewidth-2cm\\relax}{0.1pt}\\par \n\\vspace{0.5cm}}}\n\\setlist[enumerate]{label=\arabic*., ref=\arabic*}\n\\begin{document}\n\\pagestyle{empty}\n\n- Chaque sujet doit commencer par la balise \\enteteperso{Version} et finir par la balise \\newpage\n- Chaque correction doit commencer par la balise \\section*{Correction Version }\n- Utilise la balise \\begin{enumerate} pour les exercices\n- Utilise \\noindent au début de chaque exercice\n- Utilise l'environnement verbatim pour Python" 
            },
            { 
                id: 'CORRECTION', label: '✅ Générer la Correction', color: '#34495e', advice: "📁 Charger le sujet en tex ou pdf.",
                content: "En tant qu'enseignant, rédige une correction en LaTeX, bien détaillée de tous les exercices de ce document compréhensible par les élèves de la classe de {{classe}}\n{{contrainte}}\n- Je ne veux aucune référence ou citation\n- Force un saut à la ligne après chaque question\n- N'utilise pas de balise subsection\n- Pour python utilise l'environnement verbatim\n- Je souhaite le code complet\n\n### STRUCTURE DE MISE EN PAGE à respecter scrupuleusement:\n\\documentclass[preview,varwidth,margin=1.5cm]{standalone}\n\\usepackage[utf8]{inputenc}\n\\usepackage[T1]{fontenc}\n\\usepackage[french]{babel}\n\\usepackage{amsmath, amssymb, eurosym, amsfonts, amsthm, geometry, enumerate, enumitem, tabularx, eurosym, tikz,tkz-tab,multicol}\n\\newcommand{\\PhamN}{\\mbox{\\scalebox{1.5}[1]{P}\\kern-0.6em\\raisebox{0ex}[0pt][0pt]{\\fontsize{6}{6}\\selectfont ham}\n\\kern-0.5em\\scalebox{1.5}[1]{N}}}\n\\title{\\textbf{Correction du {{titre}} : {{theme}}}}\n\\author{\\PhamN}\n\\date{}\n\n\\begin{document}\n\\maketitle\n\n... Insère ici la correction bien détaillée de tous les exercices ...\n\n\\end{document}" 
            }
        ]
    };

    window.onload = () => { renderApp(); };

    function renderApp() {
        const group = document.getElementById('main-button-group');
        group.innerHTML = '';
        config.prompts.forEach(p => {
            const btn = document.createElement('button');
            btn.className = 'btn-prompt';
            btn.style.backgroundColor = p.color;
            btn.innerText = p.label;
            btn.onclick = () => genererPrompt(p.id);
            group.appendChild(btn);
        });
    }

    function genererPrompt(id) {
        const p = config.prompts.find(x => x.id === id);
        let text = p.content;
        
        const values = {
            titre: document.getElementById('titre').value || "Titre",
            classe: document.getElementById('classe').value,
            theme: document.getElementById('theme').value || "Thème",
            duree: document.getElementById('duree').value || "1h",
			no_python: document.getElementById('no_python').checked ? "\n- Je ne souhaite aucune question relative à python" : "",
            contrainte: document.getElementById('contrainte').value ? `\n### CONTRAINTES SPÉCIFIQUES :\n- ${document.getElementById('contrainte').value}\n` : ""
        };

        Object.keys(values).forEach(k => {
            text = text.replace(new RegExp(`{{${k}}}`, 'g'), values[k]);
        });

        document.getElementById('result').value = text;
        
        const advEl = document.getElementById('advice-display');
        if(p.advice) {
            let adviceFinal = p.advice;
            Object.keys(values).forEach(k => adviceFinal = adviceFinal.replace(new RegExp(`{{${k}}}`, 'g'), values[k]));
            advEl.innerText = "💡 CONSEIL : " + adviceFinal;
            advEl.style.display = 'block';
        } else {
            advEl.style.display = 'none';
        }
        
        copyToClipboard();
    }

    function showInfo() {
        alert("📌 Informations Enseignant :\n\n- Établissement : Lycée Général de Bègles (33) / Václav Havel.\n- Niveaux : 2nde, 1ère (Spé/ST2S), Term (Spé/Compl/ST2S).\n- SNT : Programmation Python.\n- Formatage : Export systématique en LaTeX.\n- Organisation : Semestres (2nde/1ère) et Trimestres (Terminale).");
    }

    function copyToClipboard() {
        const textarea = document.getElementById('result');
        textarea.select();
        document.execCommand('copy');
        const badge = document.getElementById('copy-status');
        badge.style.display = 'block';
        setTimeout(() => { badge.style.display = 'none'; }, 2000);
    }

    function copyAndOpenGemini() {
        copyToClipboard();
        window.open('https://gemini.google.com/app', '_blank');
    }
</script>
</body>
</html>
